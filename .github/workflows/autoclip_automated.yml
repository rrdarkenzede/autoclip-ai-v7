name: AutoClipAI Daily Cycle (Operation Publication)

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install --with-deps chromium

      - name: Create Work Directories
        run: |
          mkdir -p logs downloads stockpile clips

      - name: Run AutoClipAI (Operation Publication)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          TIKTOK_PROFILE_URL: ${{ secrets.TIKTOK_PROFILE_URL }}
          YOUTUBE_CHANNEL_URL: ${{ secrets.YOUTUBE_CHANNEL_URL }}
          PUBLISH_TO_TIKTOK: ${{ secrets.PUBLISH_TO_TIKTOK || 'true' }}
          PUBLISH_TO_YOUTUBE: ${{ secrets.PUBLISH_TO_YOUTUBE || 'true' }}
          PYTHONUNBUFFERED: 1
        run: |
          # Use mode 2 (Full Cycle: Discovery + Publishing from Drive)
          python main.py --mode 2
